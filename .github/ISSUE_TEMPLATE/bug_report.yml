name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue and what you expected.
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact command you ran.
  - type: input
    id: terminal
    attributes:
      label: Terminal and OS
      placeholder: "Kitty 0.35 on macOS, Windows Terminal 1.22, WezTerm on Linux"
  - type: textarea
    id: logs
    attributes:
      label: Output
      render: text
