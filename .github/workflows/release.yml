name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          asset="terminal-stickers-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/terminal-stickers" dist/terminal-stickers
          cp -R packs dist/packs
          tar -czf "$asset" -C dist terminal-stickers packs
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi

      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $asset = "terminal-stickers-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\terminal-stickers.exe" "dist\terminal-stickers.exe"
          Copy-Item -Recurse "packs" "dist\packs"
          Compress-Archive -Force -Path "dist\*" -DestinationPath $asset
          $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLowerInvariant()
          "$hash  $asset" | Set-Content "$asset.sha256"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            terminal-stickers-${{ matrix.target }}.${{ matrix.archive }}
            terminal-stickers-${{ matrix.target }}.${{ matrix.archive }}.sha256
