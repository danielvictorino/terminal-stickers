<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terminal Stickers hero preview</title>
  <desc id="desc">A stylized terminal chat interface showing sticker search, a conversation pane, animated text effects, and renderer support.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.48" stop-color="#101827"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="190" y1="90" x2="1040" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#facc15"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="shadow" x="64" y="74" width="1072" height="476" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="620" rx="36" fill="url(#bg)"/>
  <rect x="80" y="88" width="1040" height="420" rx="24" fill="#050816" stroke="url(#accent)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="80" y="88" width="1040" height="54" rx="24" fill="#111827"/>
  <circle cx="113" cy="116" r="8" fill="#fb7185"/>
  <circle cx="139" cy="116" r="8" fill="#facc15"/>
  <circle cx="165" cy="116" r="8" fill="#22c55e"/>
  <text x="600" y="123" text-anchor="middle" fill="#cbd5e1" font-family="JetBrains Mono, Consolas, monospace" font-size="16">terminal-stickers chat</text>

  <rect x="112" y="172" width="362" height="292" rx="18" fill="#0f172a" stroke="#243244"/>
  <text x="140" y="210" fill="#facc15" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="700">Sticker Packs</text>
  <text x="140" y="247" fill="#e2e8f0" font-family="JetBrains Mono, Consolas, monospace" font-size="18">starter/laugh</text>
  <text x="140" y="282" fill="#94a3b8" font-family="JetBrains Mono, Consolas, monospace" font-size="16">reaction, funny, brasil</text>
  <rect x="136" y="310" width="306" height="94" rx="14" fill="#172033" stroke="#334155"/>
  <text x="160" y="348" fill="#22d3ee" font-family="JetBrains Mono, Consolas, monospace" font-size="17">/ search: mandou</text>
  <text x="160" y="380" fill="#f8fafc" font-family="JetBrains Mono, Consolas, monospace" font-size="18">&gt;+* sent Laugh *+&lt;</text>
  <text x="140" y="438" fill="#64748b" font-family="JetBrains Mono, Consolas, monospace" font-size="15">enter sends - q exits</text>

  <rect x="510" y="172" width="578" height="292" rx="18" fill="#08111f" stroke="#243244"/>
  <text x="540" y="210" fill="#f8fafc" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="700">Conversation</text>
  <text x="540" y="252" fill="#94a3b8" font-family="JetBrains Mono, Consolas, monospace" font-size="17">me: [starter/laugh] Laugh</text>

  <rect x="540" y="284" width="190" height="150" rx="20" fill="#facc15"/>
  <circle cx="635" cy="359" r="59" fill="#fde68a"/>
  <circle cx="612" cy="340" r="9" fill="#111827"/>
  <circle cx="658" cy="340" r="9" fill="#111827"/>
  <path d="M596 374C620 397 653 397 676 374" stroke="#111827" stroke-width="10" stroke-linecap="round"/>
  <path d="M588 321L605 311" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
  <path d="M681 321L664 311" stroke="#111827" stroke-width="6" stroke-linecap="round"/>

  <rect x="760" y="290" width="292" height="136" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="786" y="326" fill="#22d3ee" font-family="JetBrains Mono, Consolas, monospace" font-size="17">renderers</text>
  <text x="786" y="360" fill="#e2e8f0" font-family="JetBrains Mono, Consolas, monospace" font-size="16">kitty  sixel  iterm2</text>
  <text x="786" y="392" fill="#e2e8f0" font-family="JetBrains Mono, Consolas, monospace" font-size="16">halfblocks  plain</text>

  <text x="92" y="554" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">WhatsApp-style sticker reactions for the terminal</text>
  <text x="92" y="590" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">Browse packs, preview image stickers, and send animated ASCII reactions from one Rust CLI.</text>
</svg>
